version: '3.8'

services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # Communication inter-services (serveur -> API) et publique
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  api:
    extends:
      file: ./backend/docker-compose.yml
      service: api
    build:
      context: ./backend

  worker:
    extends:
      file: ./backend/docker-compose.yml
      service: worker
    build:
      context: ./backend

  db:
    extends:
      file: ./backend/docker-compose.yml
      service: db

  redis:
    extends:
      file: ./backend/docker-compose.yml
      service: redis

volumes:
  postgres_data:
  frontend_node_modules:
